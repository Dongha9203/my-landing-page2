<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이동하 · AI컨설턴트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      font-size: 16px;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      max-width: 560px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 0;
    }

    .header-card {
      background: #1F3864;
      color: #fff;
      border-radius: 8px;
      padding: 1.5rem 1.25rem 1.75rem;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* Language box — top-right */
    .lang-box {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 6px;
      overflow: hidden;
    }

    .lang-btn {
      background: transparent;
      color: rgba(255, 255, 255, 0.8);
      border: none;
      padding: 0.3rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-family: inherit;
    }

    .lang-btn + .lang-btn {
      border-left: 1px solid rgba(255, 255, 255, 0.4);
    }

    .lang-btn.active {
      background: #fff;
      color: #1F3864;
    }

    /* Profile photo */
    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.9);
      flex-shrink: 0;
      margin-bottom: 1rem;
    }

    .header-text {
      width: 100%;
      text-align: center;
    }

    /* Identity line — 1.5× body (= 1.5rem = 24px) */
    .identity {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.35;
      word-break: keep-all;
    }

    /* ── Main ────────────────────────────────────────────── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    /* Bio */
    .bio {
      background: #fff;
      border-left: 4px solid #1F3864;
      border-radius: 0 8px 8px 0;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.75rem;
      line-height: 1.8;
      font-size: 0.92rem;
      color: #333;
      overflow-wrap: anywhere;
    }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #1F3864;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    /* Career cards */
    .career-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .career-card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.9rem;
      align-items: start;
    }

    .career-period {
      background: #1F3864;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.3rem 0.55rem;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 0.15rem;
      letter-spacing: 0.02em;
    }

    .career-company {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1F3864;
    }

    .career-role {
      font-size: 0.85rem;
      color: #333;
      margin-top: 0.15rem;
    }

    .career-summary {
      font-size: 0.78rem;
      color: #333;
      margin-top: 0.1rem;
      opacity: 0.75;
    }

    /* ── Contact buttons ──────────────────────────────────── */
    .contact-buttons {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      border: none;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .btn-email {
      background: #1F3864;
      color: #fff;
    }

    .btn-phone {
      background: #fff;
      color: #1F3864;
      border: 2px solid #1F3864;
    }

    .btn-contact-info {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 0.25rem;
      letter-spacing: 0.01em;
    }

    /* ── Toast ───────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 0.55rem 1.3rem;
      border-radius: 20px;
      font-size: 0.82rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.visible { opacity: 1; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 400px) {
      .identity { font-size: 1.25rem; }
      .career-period { font-size: 0.62rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="header-card">

    <!-- Language toggle (optional feature) -->
    <div class="lang-box" role="group" aria-label="언어 선택">
      <button class="lang-btn active" data-lang="ko">KO</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ja">JA</button>
    </div>

    <!-- Profile photo (optional feature — hidden gracefully if file is absent) -->
    <img class="profile-photo" src="./images/my-photo.jpg" alt="이동하 프로필 사진"
         onerror="this.style.display='none'">

    <!-- Identity: name · title · company -->
    <div class="header-text">
      <p class="identity"
         data-ko="이동하 · AI컨설턴트 · (주)상상우리"
         data-en="Dongha Lee · AI Consultant · Sangsang Woori"
         data-ja="イ・ドンハ · AIコンサルタント · (株)サンサンウリ">
        이동하 · AI컨설턴트 · (주)상상우리
      </p>
    </div>

  </div>
</header>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main>

  <!-- Bio -->
  <p class="bio"
     data-ko="약 33년동안 금융기관 및 정부기관 대상 SW개발과 Project Management를 수행하였고, 중소기업 SI회사 경영을 하였습니다. 현재는 생성형AI를 활용한 컨설팅을 하고 있습니다."
     data-en="Over 33 years of experience in software development and project management for financial and government institutions, and management of an SME SI company. Currently providing consulting using generative AI."
     data-ja="約33年間にわたり、金融機関・政府機関向けのSW開発とプロジェクトマネジメントを行い、中小企業向けSI会社の経営を行いました。現在は生成AIを活用したコンサルティングを行っています。">
    약 33년동안 금융기관 및 정부기관 대상 SW개발과 Project Management를 수행하였고, 중소기업 SI회사 경영을 하였습니다. 현재는 생성형AI를 활용한 컨설팅을 하고 있습니다.
  </p>

  <!-- Career -->
  <p class="section-label"
     data-ko="경 력" data-en="Career" data-ja="経 歴">경 력</p>

  <div class="career-list">

    <div class="career-card">
      <span class="career-period"
            data-ko="2026 ~ 현재" data-en="2026 ~ Present" data-ja="2026 ~ 現在">
        2026 ~ 현재
      </span>
      <div>
        <p class="career-company"
           data-ko="(주)상상우리" data-en="Sangsang Woori" data-ja="(株)サンサンウリ">
          (주)상상우리
        </p>
        <p class="career-role"
           data-ko="AI컨설턴트" data-en="AI Consultant" data-ja="AIコンサルタント">
          AI컨설턴트
        </p>
        <p class="career-summary"
           data-ko="중소기업 AI 컨설팅" data-en="AI consulting for SMEs" data-ja="中小企業AIコンサルティング">
          중소기업 AI 컨설팅
        </p>
      </div>
    </div>

    <div class="career-card">
      <span class="career-period"
            data-ko="2013 ~ 2023" data-en="2013 ~ 2023" data-ja="2013 ~ 2023">
        2013 ~ 2023
      </span>
      <div>
        <p class="career-company"
           data-ko="오티아이(주)" data-en="OTI Inc." data-ja="OTI(株)">
          오티아이(주)
        </p>
        <p class="career-role"
           data-ko="대표이사" data-en="CEO" data-ja="代表取締役">
          대표이사
        </p>
        <p class="career-summary"
           data-ko="경영" data-en="Management" data-ja="経営">
          경영
        </p>
      </div>
    </div>

    <div class="career-card">
      <span class="career-period"
            data-ko="1993 ~ 2013" data-en="1993 ~ 2013" data-ja="1993 ~ 2013">
        1993 ~ 2013
      </span>
      <div>
        <p class="career-company"
           data-ko="삼성SDS(주)" data-en="Samsung SDS" data-ja="サムスンSDS(株)">
          삼성SDS(주)
        </p>
        <p class="career-role"
           data-ko="그룹장" data-en="Group Leader" data-ja="グループ長">
          그룹장
        </p>
        <p class="career-summary"
           data-ko="Project Management" data-en="Project Management" data-ja="プロジェクトマネジメント">
          Project Management
        </p>
      </div>
    </div>

  </div>

  <!-- Contact buttons -->
  <div class="contact-buttons">
    <a  class="btn btn-email"
        id="btn-email"
        href="mailto:wasedakorea@naver.com"
        data-ko="이메일 보내기"
        data-en="Send Email"
        data-ja="メールを送る">
      <span class="btn-label">이메일 보내기</span>
      <span class="btn-contact-info">kameido90@naver.com</span>
    </a>
    <button class="btn btn-phone"
            id="btn-phone"
            onclick="copyPhone()"
            data-ko="전화 걸기"
            data-en="Call"
            data-ja="電話をかける">
      <span class="btn-label">전화 걸기</span>
      <span class="btn-contact-info">010.8875.9203</span>
    </button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  const PHONE = '010-8875-9203';
  let currentLang = 'ko';

  const toastMsg = {
    ko: PHONE + ' 복사되었습니다',
    en: PHONE + ' copied to clipboard',
    ja: PHONE + ' コピーしました',
  };

  function copyPhone() {
    navigator.clipboard.writeText(PHONE)
      .then(() => showToast(toastMsg[currentLang]))
      .catch(() => {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = PHONE;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(toastMsg[currentLang]);
      });
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('visible'), 2500);
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn')
        .forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('[data-ko]').forEach(el => {
        const label = el.querySelector('.btn-label');
        if (label) {
          label.textContent = el.dataset[currentLang] || el.dataset.ko;
        } else {
          el.textContent = el.dataset[currentLang] || el.dataset.ko;
        }
      });
    });
  });
</script>

</body>
</html>
